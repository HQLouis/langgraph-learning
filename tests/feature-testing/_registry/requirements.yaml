- id: R-01-03
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: '[DRAFT] Wenn das Kind nicht verstanden hat: -nachfragen, was das Kind noch nicht verstanden
    hat,…'
  anforderung_de: 'Wenn das Kind nicht verstanden hat: -nachfragen, was das Kind noch nicht verstanden
    hat, dann-noch einmal erklären, die Antwort dabei nochmal vereinfachen (z.B: andere Obstsorten zum
    Vergleich nennen und nur sagen, dass es ein Obst ist, dass es sauer wie eine Zitrone schmeckt, z.
    B.) - als nächstes vorschlagen, weiter über das Buch zu sprechen (damit die Unterhaltung nicht weiter
    stockt).'
  example_refs:
  - Beispiel 1-PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  Wenn das Kind nicht verstanden hat: -nachfragen, was das Kind\
    \ noch nicht verstanden hat, dann-noch einmal erklären, die Antwort dabei nochmal vereinfachen (z.B:\
    \ andere Obstsorten zum Vergleich nennen und nur sagen, dass es ein Obst ist, dass es sauer wie eine\
    \ Zitrone schmeckt, z. B.) - als nächstes vorschlagen, weiter über das Buch zu sprechen (damit die\
    \ Unterhaltung nicht weiter stockt).\n\nIf the situation described by the requirement does not apply\
    \ to the response, answer N/A with a one-line reason. Otherwise answer PASS or FAIL with a one-line\
    \ reason."
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-01-04
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: '[DRAFT] Wenn das Kind konkret/eindeutig über die Bedeutung des Wortes nachfragt ( z. B.:
    “was ist…'
  anforderung_de: 'Wenn das Kind konkret/eindeutig über die Bedeutung des Wortes nachfragt ( z. B.: “was
    ist heil”): darf KI sofort die Bedeutung des Wortes erklären und als nächstes nachfragen, ob das Kind
    die Erklärung verstanden hat.  evtl. nach der Nachfrage kurz die Bedeutung nochmal wiederholen (wie
    im Beispielantwort).'
  example_refs:
  - Beispiel 2 PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  Wenn das Kind konkret/eindeutig über die Bedeutung des Wortes\
    \ nachfragt ( z. B.: “was ist heil”): darf KI sofort die Bedeutung des Wortes erklären und als nächstes\
    \ nachfragen, ob das Kind die Erklärung verstanden hat.  evtl. nach der Nachfrage kurz die Bedeutung\
    \ nochmal wiederholen (wie im Beispielantwort).\n\nIf the situation described by the requirement does\
    \ not apply to the response, answer N/A with a one-line reason. Otherwise answer PASS or FAIL with\
    \ a one-line reason."
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
