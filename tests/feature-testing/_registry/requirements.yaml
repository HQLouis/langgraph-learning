requirements:
- id: R-01-01
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: Übergang vom Erklären einer Wortbedeutung zurück zum Hauptdialog.
  anforderung_de: Übergang von der Klärung einer Wortbedeutung zurück zum Dialogverlauf.
  example_refs:
  - Beispiel 1-PIA
  - Beispiel 2 PIA
  - Beispiel 3
  applicability_rule_de: Diese Anforderung gilt, wenn die KI zuvor die Bedeutung eines Wortes erklärt
    hat. Die Erklärung muss als direkte Reaktion auf eine Verständnisfrage oder ein Signal des Kindes
    erfolgt sein. Die aktuelle KI-Antwort muss unmittelbar auf diese Erklärung folgen. Es wird geprüft,
    ob die KI den Dialogfluss wieder aufnimmt und fortsetzt.
  judge_criterion_en: The system's response must smoothly transition from the word explanation back to
    the main conversation flow. It should either re-engage with the previous question or topic, or introduce
    a new, contextually relevant topic. The transition must feel natural and not abrupt, avoiding an explanation
    loop. Return PASS if the system successfully transitions back to the previous topic/question or a
    new, relevant topic. Return FAIL if the system fails to transition, gets stuck in an explanation loop,
    or makes an abrupt, irrelevant jump. Return N/A if the system did not just explain a word's meaning
    in the immediately preceding turn.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-01-02
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: KI erklärt ein Wort und prüft die Zustimmung des Kindes vor Fortsetzung des Dialogs.
  anforderung_de: KI sollte sich vergewissern, dass das Kind mit der Erklärung einverstanden ist und erst
    dann weiter die reguläre Unterhaltung führen.
  example_refs:
  - Beispiel 1-PIA
  applicability_rule_de: Diese Anforderung gilt, wenn die KI dem Kind ein neues Wort oder Konzept erklärt
    hat. Die KI-Antwort muss eine Frage enthalten, die das Verständnis oder die Zustimmung des Kindes
    zur Erklärung überprüft. Gilt nicht, wenn die KI direkt zur nächsten regulären Dialogphase übergeht,
    ohne eine solche Überprüfung.
  judge_criterion_en: After the AI has explained a new word or concept, its subsequent response must include
    a question. This question should explicitly verify the child's understanding of or agreement with
    the explanation. The purpose is to ensure the child comprehends the new information before the dialogue
    continues. Return PASS if the AI's response contains a question that verifies the child's understanding
    or agreement after explaining a new word or concept. Return FAIL if the AI explains a new word or
    concept but then proceeds with the regular conversation without first checking the child's understanding
    or agreement. Return N/A if the AI has not just explained a new word or concept to the child.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-01-03
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: Erklärung eines unverstandenen Begriffs vereinfachen und Gespräch fortsetzen
  anforderung_de: 'Wenn das Kind nicht verstanden hat: -nachfragen, was das Kind noch nicht verstanden
    hat, dann-noch einmal erklären, die Antwort dabei nochmal vereinfachen (z.B: andere Obstsorten zum
    Vergleich nennen und nur sagen, dass es ein Obst ist, dass es sauer wie eine Zitrone schmeckt, z.
    B.) - als nächstes vorschlagen, weiter über das Buch zu sprechen (damit die Unterhaltung nicht weiter
    stockt).'
  example_refs:
  - Beispiel 1-PIA
  applicability_rule_de: Gilt, wenn das Kind ein zuvor genanntes Konzept oder Wort nicht verstanden hat.
    Dies äußert sich durch eine explizite Verneinung oder Nachfrage des Kindes (z.B. 'nein', 'was?').
    Die KI-Antwort muss eine vereinfachte Erklärung des unverstandenen Begriffs enthalten und anschließend
    den Übergang zum weiteren Gespräch über das Buch vorschlagen.
  judge_criterion_en: The system's response must address the child's explicit indication of not understanding
    a previously introduced concept or word. It should provide a simplified re-explanation of that specific
    concept, using analogies or simpler terms. The explanation must be easy for a child to grasp. Furthermore,
    the response must include a clear suggestion to continue the conversation about the book. Return PASS
    if the system re-explains the misunderstood concept simply and suggests continuing the book discussion.
    Return FAIL if the system does not re-explain the concept, or the explanation is not simplified, or
    it fails to suggest continuing the book discussion. Return N/A if the child's utterance does not indicate
    a lack of understanding of a specific concept.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-01-04
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: KI erklärt Wortbedeutung und fragt nach Verständnis bei direkter Nachfrage.
  anforderung_de: 'Wenn das Kind konkret/eindeutig über die Bedeutung des Wortes nachfragt ( z. B.: “was
    ist heil”): darf KI sofort die Bedeutung des Wortes erklären und als nächstes nachfragen, ob das Kind
    die Erklärung verstanden hat.  evtl. nach der Nachfrage kurz die Bedeutung nochmal wiederholen (wie
    im Beispielantwort).'
  example_refs:
  - Beispiel 2 PIA
  applicability_rule_de: Gilt nur, wenn das Kind explizit und eindeutig nach der Bedeutung eines Wortes
    fragt, zum Beispiel mit "was ist X?". Die KI muss diese Frage als direkte Bedeutungsnachfrage erkennen.
    Es gilt nicht, wenn die Frage des Kindes anders interpretiert werden kann.
  judge_criterion_en: The AI must immediately provide a clear explanation of the word's meaning. Directly
    after this explanation, the AI must explicitly ask the child if they understood the provided definition.
    An optional brief repetition of the meaning may follow the understanding check. Return PASS if the
    AI's response first explains the word's meaning and then asks the child if they understood the explanation.
    Return FAIL if the AI fails to explain the word's meaning, or does not ask for understanding, or addresses
    other topics before explaining or checking understanding. Return N/A if the child's utterance does
    not explicitly and unambiguously ask for the meaning of a word.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-01-05
  eigenschaft: 1
  eigenschaft_title_de: Übergang von einer Wortbedeutung
  title_de: Das Dialogsystem soll proaktiv die Bedeutung komplexer oder mehrdeutiger Wörter klären.
  anforderung_de: Komplexe Wörter soll sie proaktiv nachfragen. (Mehrdeutige Wörter, zusammengesetzte
    Wörter, Ideome/feste Wendungen, Antonyme,..)
  example_refs:
  - Beispiel 3
  applicability_rule_de: Diese Anforderung gilt, wenn das Dialogsystem ein komplexes Wort, eine feste
    Wendung oder einen mehrdeutigen Ausdruck in seine Äußerung einbaut, dessen Bedeutung für ein Kind
    unklar sein könnte. Das System muss dann proaktiv die Bedeutung dieses Elements hinterfragen oder
    klären. Gilt nicht, wenn das Kind das Wort bereits selbst verwendet oder dessen Bedeutung offensichtlich
    kennt.
  judge_criterion_en: The system's response must introduce a complex word, idiom, or ambiguous phrase
    that a child might not understand. The system should then proactively ask the child if they know the
    meaning or provide a clear explanation of the term. This clarification must occur immediately after
    the complex term is introduced, without waiting for the child to express confusion. Return PASS if
    the system introduces such a term and proactively clarifies its meaning or asks for understanding.
    Return FAIL if the system introduces such a term but does not proactively clarify its meaning or ask
    for understanding. Return N/A if the system's response does not contain any complex words, idioms,
    or ambiguous phrases requiring clarification.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-02-01
  eigenschaft: 2
  eigenschaft_title_de: 'Reagieren auf - Kind: “weiß nicht”'
  title_de: KI klärt Missverständnis, bietet Hilfe, stellt persönliche Frage und führt zum Buch zurück.
  anforderung_de: 'Wenn von dem Kind- “weiß nicht”- kommt, erst kurz klären, was das Kind nicht verstanden
    hat. Dann eine kurze Hilfestellung anbieten. Als nächstes: wenn es zum Inhalt passt- mit einer persönlichen
    Frage an das Kind verbinden (in diesem Fall- “ und was isst DU zum Frühstück?”). Und als nächstes
    auf das Thema im Buch zurückführen.'
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: 'Diese Anforderung gilt, wenn das Kind auf eine Frage der KI mit „weiß nicht“
    antwortet und die KI daraufhin eine umfassende Hilfestellung einleitet. Die KI muss dann in ihrer
    Antwort eine Abfolge von vier Schritten einhalten: Klärung, Hilfestellung, persönliche Frage und Rückführung
    zum Buchthema. Die persönliche Frage muss inhaltlich zum Buchthema passen.'
  judge_criterion_en: The system's response must follow a specific four-step sequence after the child
    says "weiß nicht". First, it must clarify what the child did not understand, then offer a short hint
    or the answer. Third, it must ask a personal question relevant to the book's content, and finally,
    lead the conversation back to the book's topic. Each step should be clearly identifiable in the system's
    turn. Return PASS if the system's response clearly executes all four steps in the correct order, with
    the personal question being contextually relevant. Return FAIL if the system's response misses any
    of the four steps, executes them in the wrong order, or if the personal question is irrelevant. Return
    N/A if the child did not say "weiß nicht" in the preceding turn, or if the system's response does
    not initiate this specific four-step help sequence.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
- id: R-02-02
  eigenschaft: 2
  eigenschaft_title_de: 'Reagieren auf - Kind: “weiß nicht”'
  title_de: KI darf nach 'weiß nicht' des Kindes 'bist du gespannt' oder 'bist du neugierig' nicht nutzen.
  anforderung_de: Wenn das Kind “weiß nicht” sagt, darf KI nicht “ bist du gespannt” oder “ bist du neugierig”
    in ihrer Antwort verwenden.
  example_refs:
  - Beispiel 2 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn die unmittelbar vorhergehende Äußerung des Kindes
    die Phrase 'weiß nicht' enthält. Die Prüfung bezieht sich auf die generierte Antwort des KI-Systems.
    Andere Äußerungen des Kindes, wie 'nein', lösen diese Anforderung nicht aus.
  judge_criterion_en: First, check if the child's immediately preceding utterance contains the exact phrase
    'weiß nicht'. If not, this requirement is not applicable. If applicable, examine the AI's generated
    response. The response must not contain the phrase 'bist du gespannt' or 'bist du neugierig'. The
    presence of either forbidden phrase results in a failure. Return PASS if the child's preceding utterance
    contains 'weiß nicht' AND the AI's response does not contain 'bist du gespannt' AND does not contain
    'bist du neugierig'. Return FAIL if the child's preceding utterance contains 'weiß nicht' AND the
    AI's response contains 'bist du gespannt' OR 'bist du neugierig'. Return N/A if the child's preceding
    utterance does not contain 'weiß nicht'.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
- id: R-02-03
  eigenschaft: 2
  eigenschaft_title_de: 'Reagieren auf - Kind: “weiß nicht”'
  title_de: Einfache Erklärung eines Wortes nach "weiß nicht" des Kindes mit Verständnisprüfung.
  anforderung_de: Keine komplizierte oder abstrakte Erklärung, sondern die Bedeutung in möglichst einfachen
    Worten erklären und nachfragen, ob es verständlich war. Ansonsten nochmal erklären- nochmal vereinfachen.
  example_refs:
  - Beispiel 3 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn das Kind auf eine Frage nach der Bedeutung eines
    Wortes oder Ausdrucks mit "weiß nicht" antwortet. Die KI-Antwort muss eine Erklärung des betreffenden
    Wortes oder Ausdrucks enthalten.
  judge_criterion_en: The system's response must provide a simple, non-abstract explanation of the word
    or phrase the child indicated they did not know. The explanation should be clear and easy for a child
    to understand. Crucially, the response must explicitly ask the child if the explanation was clear
    or if they would like it explained again. Return PASS if the response provides a simple explanation
    and asks for understanding. Return FAIL if the explanation is complicated, abstract, incorrect, or
    if it fails to ask for understanding. Return N/A if the child did not respond with "weiß nicht" to
    a meaning-related question, or if the system's response is not an explanation.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
- id: R-03-01
  eigenschaft: 3
  eigenschaft_title_de: Auf die Antwort des Kindes eingehen -seine Meinung und Gefühle berücksichtigen
  title_de: KI soll Gefühle der Geschichte erkennen und nach Meinung oder Erlebnissen des Kindes fragen.
  anforderung_de: 'KI soll bei der Gelegenheit, wenn die Geschichte es zulässt (wenn es um: Grundgefühle
    geht/Ereignisse, die diese hervorrufen können/...) die Möglichkeit nutzen, und die Gefühle in der
    Geschichte erkennen, kurz ansprechen und über die Meinung/persönlichen Erlebnissen des Kindes dazu
    nachzufragen. 2-3x Dialogwechsel, dann wieder zu dem Hauptthema zurück.'
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn die Geschichte ein Grundgefühl oder ein Ereignis,
    das ein solches Gefühl hervorrufen kann, thematisiert. Die KI soll daraufhin die Möglichkeit nutzen,
    um das Kind nach seiner Meinung oder persönlichen Erlebnissen zu diesem Gefühl zu befragen. Die spezifische
    Interaktion, die diese Anforderung auslöst, sollte nicht länger als 2-3 Dialogwechsel dauern, bevor
    zum Hauptthema zurückgekehrt wird.
  judge_criterion_en: The judge must first determine if the story context immediately preceding the AI's
    response mentions a basic emotion (e.g., joy, fear, sadness) or an event likely to evoke such an emotion.
    If so, the AI's response should acknowledge this emotion and then ask the child about their opinion
    or personal experiences related to it. The AI should engage in this specific line of questioning for
    a maximum of 2-3 turns, responding to the child's input. After this brief interaction, the AI must
    clearly transition back to the main story topic. Return PASS if the applicability rule is met, and
    the AI successfully initiates and manages this emotional engagement, including the transition back
    to the main topic within 2-3 turns. Return FAIL if the applicability rule is met, but the AI fails
    to initiate this engagement, or if it does so incorrectly, or if it exceeds the 2-3 turn limit without
    returning to the main topic. Return N/A if the applicability rule is not met.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-03-02
  eigenschaft: 3
  eigenschaft_title_de: Auf die Antwort des Kindes eingehen -seine Meinung und Gefühle berücksichtigen
  title_de: KI reagiert auf kindliches "vergessen" mit Klärung oder direktem Erinnerungsimpuls zur Szene
  anforderung_de: Erst sich zum Einen vergewissern, was das Kind mit "vergessen" gemeint hat/zum Anderen
    würde die Nachfrage der KI auf modellierende Art zeigen, wie das Kind den Satz “Ich habe es vergessen.”
    korrekt bildet. Da es klar ist, was das Kind gemeint hat, darf KI direkt einen kurzen Erinnerungsimpuls
    zur Szene geben.
  example_refs:
  - Beispiel 2 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn das Kind auf eine Frage der KI zum Inhalt der Geschichte
    mit "vergessen" oder einer ähnlichen Formulierung antwortet. Die KI muss dann auf diese Antwort eingehen.
    Es wird erwartet, dass die KI entweder klärt, was das Kind vergessen hat, oder direkt einen kurzen
    Erinnerungsimpuls zur Szene gibt.
  judge_criterion_en: This requirement applies when the child's last utterance is "vergessen" (or a similar
    phrase like "hab vergessen") in response to a system question about story content. The system's response
    must acknowledge the child's statement. It should either clarify what the child meant by "vergessen"
    (e.g., "Did you forget the story detail or how to phrase it?") or, if the meaning is clear, provide
    a brief reminder about the relevant scene. The clarification path should ideally model the correct
    sentence "Ich habe es vergessen." Return PASS if the system's response either clarifies what the child
    meant by "vergessen" (and optionally models the correct sentence) OR provides a short, direct reminder
    about the relevant story scene. Return FAIL if the system's response ignores the child's "vergessen"
    or provides an irrelevant or unhelpful response. Return N/A if the child's last utterance does not
    contain "vergessen" in response to a story content question.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-03-03
  eigenschaft: 3
  eigenschaft_title_de: Auf die Antwort des Kindes eingehen -seine Meinung und Gefühle berücksichtigen
  title_de: System klärt bei wiederholtem 'Nein' die Ursache und formuliert um.
  anforderung_de: Erst muss geklärt werden, warum das Kind “nein” gesagt hat→ dann auf die Antwort des
    Kindes eingehen → dann evtl. die vorige Antwort leichter/anders umformulieren, bis das Kind es verstanden
    hat.
  example_refs:
  - Beispiel 3 BOBO
  applicability_rule_de: Gilt, wenn das Kind eine negative oder unklare Antwort gibt (z.B. "nein", "nee",
    "weiß nicht"). Insbesondere gilt die Regel, wenn das Kind nach einer Umformulierung oder Alternativfrage
    erneut eine solche Antwort gibt. Dann muss das System die Ursache der Antwort klären, z.B. ob die
    Frage zu schwer ist. Wenn das Kind die Frage als zu schwer bezeichnet, muss das System die ursprüngliche
    Frage einfacher umformulieren.
  judge_criterion_en: "The system must acknowledge the child's negative or non-committal response (e.g.,\
    \ \"no\", \"I don't know\") and attempt to rephrase the question or offer alternatives. If the child\
    \ provides another negative or non-committal response after such an attempt, the system must explicitly\
    \ ask for clarification about the child's difficulty or willingness to answer. If the child indicates\
    \ the question is too difficult, the system's subsequent response must rephrase the original question\
    \ in a simpler or more accessible manner. The rephrased question should directly address the previous\
    \ topic but with reduced complexity. This criterion evaluates the system's ability to adapt to the\
    \ child's comprehension level and engagement. \nReturn PASS if the system correctly acknowledges the\
    \ child's negative/non-committal response, and if applicable, asks for clarification on difficulty,\
    \ and subsequently rephrases the question simply when difficulty is indicated. \nReturn FAIL if the\
    \ system fails to acknowledge the child's response, or fails to ask for clarification when appropriate,\
    \ or fails to rephrase the question simply after difficulty is indicated. \nReturn N/A if the child\
    \ does not provide a negative or non-committal response, or if the conversation state does not trigger\
    \ the need for clarification or rephrasing as described."
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-04-01
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: System erkennt und reagiert angemessen auf Anzeichen kindlichen Unverständnisses.
  anforderung_de: '| das Kind hat nicht gut verstanden, wenn die Antworten/das Kind:  | sehr kurz sind;
    nur "ja“ oder "nein“ sind; nicht zur Frage passen; fragt nach, obwohl es gerade erklärt wurde; Einwortreaktionen
    auf komplexe Fragen; grundsätzlich nicht nachfragt; mit Frageintonation sind | | :---- | :---- | |
    Wörter, die zeigen könnten, dass das Kind etwas nicht versteht | hä, warum, wieso, nochmal sagen,
    ich verstehe nicht, kapier ich nicht, keine Ahnung, vergessen, vielleicht, äh, ähm, also, hmm, mh,
    hm, okay, gut, ... | | Das Kind wiederholt nur ein Wort aus der Frage | "Carl?“/ "Zusammen?“ | | Ausweichreaktionen/
    Themenwechsel | egal, weiß ich nicht genau, ist mir egal, weiß nicht mehr, keine Lust, ist halt so,
    keine Ahnung | | Antwort passt logisch nicht zur Frage | warte, moment, äh, ich überlege, hm, also
    | | Albernheit | Quatschantwort, bewusst falsche Antwort, Lachen statt Antwort, Thema wechseln |'
  example_refs:
  - Beispiel 1 PIA
  - Beispiel 2 BOBO
  - Beispiel 3 PIA
  - Beispiel 4 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn die vorherige Äußerung des Kindes Anzeichen von
    Unverständnis, Unsicherheit oder Ablenkung aufweist. Solche Anzeichen sind beispielsweise sehr kurze
    Antworten, Einwortreaktionen auf komplexe Fragen, Nachfragen zu bereits Erklärtem oder die Verwendung
    von Füllwörtern wie "hä" oder "äh". Auch logisch unpassende Antworten, Themenwechsel oder Albernheiten
    des Kindes lösen diese Anforderung aus. Die Systemantwort muss dann auf dieses kindliche Verhalten
    eingehen.
  judge_criterion_en: 'The system''s response must acknowledge and address the child''s apparent lack
    of understanding, as indicated by their previous turn. It should attempt to clarify, rephrase the
    question, or offer assistance to guide the child towards comprehension. The response must not ignore
    the child''s confusion or simply repeat the previous question without modification.

    Return PASS if the system''s response appropriately addresses the child''s misunderstanding.

    Return FAIL if the system''s response ignores the child''s misunderstanding or exacerbates it.

    Return N/A if the child''s previous turn does not indicate a lack of understanding.'
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
- id: R-04-02
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: KI fragt nach Wortbedeutung, wenn Kind ein Wort aus vorheriger KI-Antwort wiederholt
  anforderung_de: Wenn das Kind ein einzelnes Wort aus der KI-Antwort wiederholt, muss KI nachfragen,
    höchstwahrscheinlich kennt das Kind die Bedeutung des Wortes nicht.
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: Diese Anforderung gilt, wenn das Kind ein einzelnes Wort aus der unmittelbar
    vorhergehenden KI-Antwort wiederholt. Die KI-Antwort muss dann auf diese Wortwiederholung eingehen.
    Es wird angenommen, dass das Kind die Bedeutung des wiederholten Wortes nicht kennt.
  judge_criterion_en: 'This criterion evaluates if the AI appropriately handles a child''s repetition
    of a word. If the child repeats a single word from the AI''s immediately preceding turn, the AI should
    acknowledge this. The AI''s response must then offer to clarify the meaning of that specific word.

    Return PASS if the AI''s response asks if the child wants to know the meaning of the repeated word
    or offers an explanation.

    Return FAIL if the AI''s response ignores the repeated word or responds to it in a way that does not
    address potential lack of understanding.

    Return N/A if the child did not repeat a single word from the AI''s immediately preceding turn.'
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-04-03
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: KI soll bei mehrdeutigen Einwortsätzen des Kindes nachfragen, um die Bedeutung zu klären.
  anforderung_de: 'KI soll öfter nachfragen, was das Kind mit dem Einwortsatz gemeint hat, damit sie sicherstellen
    kann, was das Kind meint. Bemerkung: Ein Einwortsatz kann als Antwort akzeptiert sein, nur wenn zwei
    einzelne Wörter zur Wahl als Antwort vorgegeben sind!'
  example_refs:
  - Beispiel 2 BOBO
  applicability_rule_de: Diese Anforderung gilt, wenn das Kind mit einem Einwortsatz antwortet. Der Einwortsatz
    muss dabei mehrdeutig sein und die KI kann die Bedeutung nicht eindeutig aus dem Kontext der vorherigen
    Frage ableiten. Dies schließt Fälle ein, in denen die KI zuvor zwei einzelne Wörter zur Wahl gestellt
    hat und das Kind mit einem mehrdeutigen Einwortsatz wie 'ja' oder 'nein' antwortet. Die KI muss in
    diesem Fall nachfragen, um die Bedeutung zu klären.
  judge_criterion_en: First, determine if the child's previous turn was a single-word utterance. Second,
    assess if this single-word utterance was ambiguous in the context of the AI's preceding question.
    This includes cases where the AI offered two single-word choices (e.g., 'A or B?') and the child responded
    with an ambiguous single word like 'yes' or 'no'. Return PASS if the AI's current response explicitly
    seeks clarification for the child's ambiguous single-word answer. Return FAIL if the AI's current
    response does not clarify the ambiguous single-word answer or proceeds without understanding it. Return
    N/A if the child's previous turn was not a single-word utterance, or if the single-word utterance
    was unambiguous.
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-04-04
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: Bei Kindantwort “vergessen” immer die gemeinte Person klären und nicht mit “fast” reagieren.
  anforderung_de: Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst meint, oder die Person
    aus der Geschichte. Dabei die Wahlfrage in zwei einzelne Fragen splitten, da es sonst für das Kind
    sprachlich zu kompliziert sein könnte. KI darf auf die Kindantwort “vergessen” nicht mit “fast” reagieren,
    als ob es nur eine falsche Antwort wäre.
  example_refs:
  - Beispiel 3 PIA
  applicability_rule_de: Diese Regel gilt, wenn das Kind das Wort „vergessen“ als Antwort auf eine Frage
    der KI äußert. Die KI muss dann die Mehrdeutigkeit klären, ob das Kind sich selbst oder eine Person
    aus der Geschichte meint. Diese Klärung muss durch zwei separate Fragen erfolgen. Die KI darf in ihrer
    direkten Reaktion auf die Kindantwort „vergessen“ nicht das Wort „fast“ verwenden.
  judge_criterion_en: 'The AI''s response must clarify whether the child meant themselves or a character
    from the story when the child said "vergessen". This clarification must be presented as two distinct
    questions, one for each possible subject. The AI must not use the word "fast" (almost) in its immediate
    response to the child''s "vergessen".

    Return PASS if the AI clarifies the ambiguity of "vergessen" with two separate questions and does
    not use "fast".

    Return FAIL if the AI fails to clarify the ambiguity, uses "fast", or combines the clarification into
    a single question.

    Return N/A if the child did not use "vergessen" as an answer.'
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-04-05
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: Bei kindlicher Unsicherheit soll die KI nachfragen und die Frage auflösen.
  anforderung_de: Nicht auf der Fortsetzung beharren, wenn das Kind "nicht weiß" sagt, - die Frage auflösen.
    Zur Sicherheit immer nachfragen, ob KI das Kind richtig verstanden hat.
  example_refs:
  - Beispiel 4 PIA
  applicability_rule_de: Diese Anforderung gilt für eine KI-Antwort, die unmittelbar auf eine Äußerung
    des Kindes folgt. Die kindliche Äußerung muss dabei Unsicherheit oder Unwissenheit ausdrücken, beispielsweise
    durch eine Frage oder Formulierungen wie "nicht weiß".
  judge_criterion_en: This criterion applies if the child's preceding turn expresses uncertainty or explicitly
    states a lack of knowledge (e.g., "lara?", "I don't know"). The AI's response must first seek clarification
    or confirmation of its understanding of the child's uncertain input. If the child confirms the AI's
    understanding, the AI must then resolve the original question without insisting on a correct answer
    from the child. This means the AI should provide the answer or transition to a new topic. Return PASS
    if the AI's response clarifies its understanding of the child's uncertain input and, if confirmed,
    resolves the original question without pressing for a new guess. Return FAIL if the AI's response
    ignores the child's uncertainty, fails to clarify, or insists on a correct answer after clarification.
    Return N/A if the child's preceding turn does not express uncertainty or lack of knowledge.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
