    \ nicht mehr verlängert werden. Es soll in der Antwort klar werden, dass die Geschichte zu Ende ist.\
    \ KI darf aber zum Schluss nachfragen, wie die Geschichte dem Kind gefallen hat , dann die Vorfreude\
