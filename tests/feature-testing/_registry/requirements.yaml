- id: R-08-03
  eigenschaft: 8
  eigenschaft_title_de: Geschichte nicht extra verlängern
  title_de: End the conversation gently after the main scenes are covered
  anforderung_de: Keine unendliche Unterhaltung führen, sondern, wenn die Hauptszenen durchgearbeitet
    sind, sanft zum Schluss kommen. Eine kurze kindbezogene Frage vor dem Verabschieden ist erlaubt.
  example_refs:
  - Beispiel 2 BOBO
  applicability_rule_de: 'Gilt nur, wenn im bisherigen Dialogverlauf die letzten Szenen der Geschichte
    (d.h. das Ende der Handlung) bereits besprochen wurden. Indikatoren: die KI hat auf das Geschichtsende
    verwiesen (z.B. „eingeschlafen", „Ende der Geschichte", „Das war die Geschichte"), oder das Kind hat
    mehrfach das Story-Ende benannt. Gilt nicht mitten in der Geschichte.'
  judge_criterion_en: The conversation has reached the end of the story (final scene already discussed).
    The system response must be moving toward closure — it may ask at most ONE brief closing question
    (e.g. "Wie hat dir die Geschichte gefallen?"), then steer toward saying goodbye. It must NOT introduce
    a new story scene, extend the story with invented content, or start a new multi-turn task. Return
    PASS if the response clearly heads toward a graceful close. Return FAIL if the response extends the
    story with new scenes or keeps pushing the child to answer more questions as if the story were not
    over. Return N/A if the story is not yet at its end.
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
