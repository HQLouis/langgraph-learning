  judge_criterion_en: The AI's response must incorporate specific, concrete details such as colors, locations,
    or objects into its description of a scene. These details should be visually descriptive and help
    the child better imagine the situation. The details must be relevant to the ongoing narrative and
    not generic or abstract. The AI should actively enrich the shared mental model of the scene. Return
