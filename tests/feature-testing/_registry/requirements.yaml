  judge_criterion_en: The judge must evaluate if the AI's generated question maintains a clear and direct
    connection to the ongoing story or the immediate conversational context. The question should logically
    follow from the preceding dialogue and the established narrative elements. It must not be an isolated,
    ambiguous, or out-of-context query that introduces a new, unrelated topic. The question should either
    elaborate on the current scene, ask for details about an object mentioned, or continue the narrative
    flow. Return PASS if the AI's question clearly relates to the current story or context. Return FAIL
    if the AI's question is isolated, unclear, or lacks a direct connection to the ongoing narrative.
    Return N/A if the AI's response is not a question.
