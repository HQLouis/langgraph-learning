- id: R-16-01
  eigenschaft: 16
  eigenschaft_title_de: keine Aufforderung zum Wiederholen geben
  title_de: Do not ask the child to repeat words or sentences
  anforderung_de: Die KI soll keine Aufforderung wie "Sag das nochmal“ oder Ähnliches geben.
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: Gilt immer. Gilt insbesondere, wenn das Kind soeben eine Antwort gegeben hat
    und die KI darauf reagiert. Die KI darf das Kind nicht auffordern, ein Wort oder einen Satz zu wiederholen
    oder nachzusprechen (z.B. „Sag das nochmal", „Kannst du das auch sagen?", „Wiederhole mal..."). Gilt
    nicht, wenn die KI selbst einen korrigierten Satz modelliert, ohne zum Nachsprechen aufzufordern.
  judge_criterion_en: 'The system must not include any request that the child repeat, echo, or say again
    a word or sentence. Forbidden patterns include (but are not limited to): "Sag das nochmal", "Kannst
    du das auch sagen", "Wiederhole bitte", "Sprich mir nach", "Sag mal: ...". Return FAIL if any such
    imperative to repeat is present. Return PASS if the response contains no repetition prompt. Return
    N/A only if the response is empty or clearly not addressing the child.'
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: active
