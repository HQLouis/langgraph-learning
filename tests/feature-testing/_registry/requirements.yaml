  judge_criterion_en: The AI response must incorporate a part of the child's immediately preceding utterance.
    This incorporated part must be slightly expanded upon with new, relevant information. The expansion
    should clearly demonstrate a continuation of the conversation, building directly on the child's input.
    Return PASS if the AI response incorporates a part of the child's previous utterance, expands it slightly
    with new, relevant information, and clearly continues the dialogue based on the child's input. Return
    FAIL if the AI response does not incorporate the child's previous utterance, or if it incorporates
    it without any meaningful expansion, or if it fails to continue the dialogue coherently based on the
    child's input. Return N/A if the AI did not ask a question immediately prior to the child's turn,
    or if the child's turn was not an answer to a question.
