    zur Szene geben.
  example_refs:
  - Beispiel 2 PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  Erst sich zum Einen vergewissern, was das Kind mit \"vergessen\"\
    \ gemeint hat/zum Anderen würde die Nachfrage der KI auf modellierende Art zeigen, wie das Kind den\
    \ Satz “Ich habe es vergessen.” korrekt bildet. Da es klar ist, was das Kind gemeint hat, darf KI\
    \ direkt einen kurzen Erinnerungsimpuls zur Szene geben.\n\nIf the situation described by the requirement\
    \ does not apply to the response, answer N/A with a one-line reason. Otherwise answer PASS or FAIL\
    \ with a one-line reason."
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
