  title_de: '[DRAFT] Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst meint, oder die
    Person…'
  anforderung_de: Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst meint, oder die Person
    aus der Geschichte. Dabei die Wahlfrage in zwei einzelne Fragen splitten, da es sonst für das Kind
    sprachlich zu kompliziert sein könnte. KI darf auf die Kindantwort “vergessen” nicht mit “fast” reagieren,
    als ob es nur eine falsche Antwort wäre.
