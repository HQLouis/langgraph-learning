    dabei eine Szene aufbauen, die ein klares Bild im Kopf des Kindes erzeugt. Sie gilt nicht für einfache
    Bestätigungen, kurze Übergänge oder reine Informationsfragen ohne Szenenbezug.
  judge_criterion_en: The AI's response must establish a clear mental image for the child by describing
    a specific situation. It must explicitly mention a location, at least one character, and at least
    one concrete object relevant to the scene. The description should be vivid enough for a child to easily
    imagine the scenario before answering the question. Return PASS if the response clearly describes
    a scene including a location, at least one character, and at least one concrete object. Return FAIL
    if the response asks a question without providing sufficient contextual details (location, character,
    object). Return N/A if the response is not setting up a new question-task or elaborating on a scene
    for a question.
