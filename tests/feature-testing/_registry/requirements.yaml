- id: R-03-01
  eigenschaft: 3
  eigenschaft_title_de: Auf die Antwort des Kindes eingehen -seine Meinung und Gefühle berücksichtigen
  title_de: '[DRAFT] KI soll bei der Gelegenheit, wenn die Geschichte es zulässt (wenn es um: Grundgefühle
    geh…'
  anforderung_de: 'KI soll bei der Gelegenheit, wenn die Geschichte es zulässt (wenn es um: Grundgefühle
    geht/Ereignisse, die diese hervorrufen können/...) die Möglichkeit nutzen, und die Gefühle in der
    Geschichte erkennen, kurz ansprechen und über die Meinung/persönlichen Erlebnissen des Kindes dazu
    nachzufragen. 2-3x Dialogwechsel, dann wieder zu dem Hauptthema zurück.'
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  KI soll bei der Gelegenheit, wenn die Geschichte es zulässt (wenn\
    \ es um: Grundgefühle geht/Ereignisse, die diese hervorrufen können/...) die Möglichkeit nutzen, und\
    \ die Gefühle in der Geschichte erkennen, kurz ansprechen und über die Meinung/persönlichen Erlebnissen\
    \ des Kindes dazu nachzufragen. 2-3x Dialogwechsel, dann wieder zu dem Hauptthema zurück.\n\nIf the\
    \ situation described by the requirement does not apply to the response, answer N/A with a one-line\
    \ reason. Otherwise answer PASS or FAIL with a one-line reason."
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
- id: R-03-02
