- id: R-04-03
  eigenschaft: 4
  eigenschaft_title_de: Mehrdeutigkeit/ Unklarheit/
  title_de: '[DRAFT] Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst meint, oder die
    Person…'
  anforderung_de: Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst meint, oder die Person
    aus der Geschichte. Dabei die Wahlfrage in zwei einzelne Fragen splitten, da es sonst für das Kind
    sprachlich zu kompliziert sein könnte. KI darf auf die Kindantwort “vergessen” nicht mit “fast” reagieren,
    als ob es nur eine falsche Antwort wäre.
  example_refs:
  - Beispiel 3 PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  Bei “vergessen” - immer zusätzlich klären, ob das Kind sich selbst\
    \ meint, oder die Person aus der Geschichte. Dabei die Wahlfrage in zwei einzelne Fragen splitten,\
    \ da es sonst für das Kind sprachlich zu kompliziert sein könnte. KI darf auf die Kindantwort “vergessen”\
    \ nicht mit “fast” reagieren, als ob es nur eine falsche Antwort wäre.\n\nIf the situation described\
    \ by the requirement does not apply to the response, answer N/A with a one-line reason. Otherwise\
    \ answer PASS or FAIL with a one-line reason."
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
