  applicability_rule_de: Diese Regel gilt für KI-Antworten, die sich auf eine zuvor im Gespräch erwähnte
    oder identifizierte Entität beziehen. Sie greift, wenn die KI ein Pronomen (z.B. "das", "es", "sie")
    verwendet, um auf diese Entität zu verweisen. Gilt nicht, wenn das Pronomen ein völlig neues, unbekanntes
    oder abstraktes Konzept einführt oder der Kontext durch das Pronomen eindeutig ist.
  judge_criterion_en: 'Evaluate if the AI''s response contains pronouns (e.g., "das", "es", "sie") that
    refer to an entity previously mentioned or identified in the conversation. If such pronouns are present,
    determine if their referent is immediately and unambiguously clear from the preceding dialogue context.
    The requirement mandates replacing pronouns with concrete nouns when the context is unclear to prevent
    ambiguity regarding established entities. A context is considered unclear if a human judge cannot
    instantly identify the pronoun''s referent without additional cognitive effort.

    Return PASS if the response contains pronouns referring to previously established entities, and their
    referents are immediately and unambiguously clear from the preceding dialogue.

    Return FAIL if the response contains a pronoun (e.g., "das", "es", "sie") referring to a previously
    established entity, and its referent is ambiguous or unclear given the preceding conversation.

    Return N/A if the response contains no pronouns referring to previously established entities, or if
    all pronouns refer to new, unknown, or abstract concepts being introduced for the first time.'
  tier: extended
  profile_sensitivity: none
  needs_background_analysis: true
