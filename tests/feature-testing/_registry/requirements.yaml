- id: R-02-01
  eigenschaft: 2
  eigenschaft_title_de: 'Reagieren auf - Kind: “weiß nicht”'
  title_de: '[DRAFT] Wenn von dem Kind- “weiß nicht”- kommt, erst kurz klären, was das Kind nicht verstanden
    h…'
  anforderung_de: 'Wenn von dem Kind- “weiß nicht”- kommt, erst kurz klären, was das Kind nicht verstanden
    hat. Dann eine kurze Hilfestellung anbieten. Als nächstes: wenn es zum Inhalt passt- mit einer persönlichen
    Frage an das Kind verbinden (in diesem Fall- “ und was isst DU zum Frühstück?”). Und als nächstes
    auf das Thema im Buch zurückführen.'
  example_refs:
  - Beispiel 1 PIA
  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  Wenn von dem Kind- “weiß nicht”- kommt, erst kurz klären, was\
    \ das Kind nicht verstanden hat. Dann eine kurze Hilfestellung anbieten. Als nächstes: wenn es zum\
    \ Inhalt passt- mit einer persönlichen Frage an das Kind verbinden (in diesem Fall- “ und was isst\
    \ DU zum Frühstück?”). Und als nächstes auf das Thema im Buch zurückführen.\n\nIf the situation described\
    \ by the requirement does not apply to the response, answer N/A with a one-line reason. Otherwise\
    \ answer PASS or FAIL with a one-line reason."
  tier: core
  profile_sensitivity: none
  needs_background_analysis: true
  status: draft
