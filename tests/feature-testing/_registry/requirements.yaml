  judge_criterion_en: The AI's response must use short and clear sentences, avoiding complex structures.
    It should describe concrete, observable actions, objects, or states rather than abstract concepts.
    Vague or overly general language is to be avoided; specific and tangible details are preferred. The
    description should be easily understandable for a child and directly relate to the immediate context.
    Return PASS if the response adheres to short, clear sentences, and describes concrete, observable
    actions or objects without using abstract terms. Return FAIL if the response contains long, unclear,
