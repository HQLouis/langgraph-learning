- id: R-06-02
  eigenschaft: 6
  eigenschaft_title_de: flüssiger Übergang zwischen den Aufgaben
  title_de: 'Flüssiger Übergang: Kindesantwort bestätigen, Gedanken spiegeln und zur Szene zurückführen'
  anforderung_de: 'Die Handlung musste genauer benannt werden ( KI: Du findest, alles richtig machen macht
    mehr Spaß? ). Als weiteres sollte KI die Antwort des Kindes erst abwarten. Dann Gedanken des Kindes
    spiegeln. Dann über persönliche Erfahrungen des Kindes nachfragen. Danach eine Gemeinsamkeit finden
    (“Ich auch”). Keine rhetorische Fragen stellen. Kurze Bestätigung, dass die Antwort des Kindes wahrgenommen
    wurde. Und, schließlich sanft zur Szene zurückführen: kurz an die Geschichtenszene erinnern und eine
    anschlißende Frage stellen.'
