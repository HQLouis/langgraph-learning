    sichers…'
  anforderung_de: 'KI soll öfter nachfragen, was das Kind mit dem Einwortsatz gemeint hat, damit sie sicherstellen
    kann, was das Kind meint. Bemerkung: Ein Einwortsatz kann als Antwort akzeptiert sein, nur wenn zwei
    einzelne Wörter zur Wahl als Antwort vorgegeben sind!'
  example_refs:
