    Antwort geben.
  judge_criterion_en: The AI's turn must contain a question directed at the child. This applies to all
    questions, including those that might appear rhetorical. The system must then pause and wait for a
    potential child response before generating its next turn. Return PASS if the AI asks a question and
    then waits for a child's response, allowing the child to speak. Return FAIL if the AI asks a question
    but immediately continues with its next turn without waiting for a child's response. Return N/A if
    the AI's turn does not contain a question.
