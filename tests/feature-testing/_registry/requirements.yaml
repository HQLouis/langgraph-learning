  applicability_rule_de: '[DRAFT] Applies to every system response. A curator must restrict this to the
    specific situations described in anforderung_de before flipping status to active.'
  judge_criterion_en: "[DRAFT — review before activation]\nEvaluate whether the system response complies\
    \ with this German requirement:\n\n  KI soll öfter nachfragen, was das Kind mit dem Einwortsatz gemeint\
    \ hat, damit sie sicherstellen kann, was das Kind meint. Bemerkung: Ein Einwortsatz kann als Antwort\
    \ akzeptiert sein, nur wenn zwei einzelne Wörter zur Wahl als Antwort vorgegeben sind!\n\nIf the situation\
