  - Beispiel 24 (Spiegel)
  - Beispiel 25 (Schaukel)
  - Beispiel 26 (Brot)
  - Beispiel 27 (Blumen)
  applicability_rule_de: Diese Regel gilt für KI-Antworten, die auf eine kurze, direkte Kindesantwort
    zu einer zuvor gestellten Szene-Frage folgen. Sie beschreibt den strukturierten Übergangsdialog, bevor
    die KI zur nächsten Szene oder Aufgabe überleitet. Die KI-Antwort muss dabei eine Brücke zwischen
    der Kindesantwort und der Fortsetzung der Geschichte schlagen.
  judge_criterion_en: The AI's response must first acknowledge the child's previous answer, then mirror
    the child's implied thoughts or feelings. Subsequently, it must ask a question about the child's personal
    experience related to the topic. The AI should then express a commonality with the child, followed
    by a gentle transition back to the story scene, including a brief reminder and a follow-up question.
    No rhetorical questions are permitted within this sequence. Return PASS if the AI's response follows
    this exact sequence and contains no rhetorical questions. Return FAIL if the AI's response deviates
    from this sequence or includes any rhetorical questions. Return N/A if the AI's response does not
    immediately follow a short, direct child's answer to a scene-related question.
